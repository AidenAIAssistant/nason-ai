<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Nason — The Oracle</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nason">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface2: #e5e5e5;
      --accent: #4f46e5;
      --accent2: #7c3aed;
      --text: #1c1c1e;
      --text2: #888899;
      --bubble-user: #4f46e5;
      --bubble-ai: #efefef;
      --radius: 20px;
      --border: #e8e8e8;
    }

    body.dark {
      --bg: #111113;
      --surface: #1a1a1e;
      --surface2: #2a2a30;
      --text: #e8e8ee;
      --text2: #888899;
      --bubble-ai: #222228;
      --border: #2a2a30;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── STAR LOGO ── */
    .star-logo {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .star-logo svg {
      animation: star-breathe 4s ease-in-out infinite;
    }
    .star-logo.lg svg { width: 70px; height: 70px; }
    .star-logo.sm svg { width: 28px; height: 28px; }

    @keyframes star-breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.82; transform: scale(1.04); }
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #splash.hidden { opacity: 0; pointer-events: none; }

    .splash-logo {
      width: 130px;
      height: 130px;
      background: #ffffff;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .splash-title {
      font-size: 1.6rem;
      font-weight: 200;
      color: #aaa;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .splash-slogan {
      font-size: 0.65rem;
      color: #ccc;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 48px;
    }

    .splash-btn {
      background: transparent;
      color: #999;
      border: 1px solid #ddd;
      padding: 14px 48px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 300;
      cursor: pointer;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }

    .splash-btn:hover {
      border-color: #4f46e5;
      color: #4f46e5;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      position: relative;
      transition: background 0.3s;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .header-avatar {
      width: 120px;
      height: 120px;
      background: var(--surface);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    .header-info {
      text-align: center;
    }

    .header-info h1 {
      font-size: 1.4rem;
      font-weight: 200;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
    }

    .header-status {
      font-size: 0.68rem;
      color: #bbb;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 2px;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Gear button */
    .gear-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: #bbb;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }
    .gear-btn:hover { color: #4f46e5; background: rgba(79,70,229,0.07); }

    /* ── SETTINGS PANEL ── */
    #settingsOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    #settingsOverlay.open { display: flex; }

    .settings-panel {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 680px;
      padding: 28px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
      animation: slideUp 0.28s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(60px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .settings-close {
      background: var(--surface2);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .settings-close:hover { background: #ddd; }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .settings-label {
      font-size: 0.72rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .settings-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.95rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .settings-input:focus { border-color: #9fa3cc; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label { font-size: 0.95rem; color: var(--text); }

    .toggle {
      width: 48px;
      height: 28px;
      background: var(--surface2);
      border-radius: 14px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.25s;
      flex-shrink: 0;
    }
    .toggle.on { background: #4f46e5; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px;
      background: white;
      border-radius: 50%;
      transition: transform 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle.on::after { transform: translateX(20px); }

    .settings-save {
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .settings-save:hover { opacity: 0.9; }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      max-width: 680px;
      align-self: center;
      width: 100%;
    }

    .messages::-webkit-scrollbar { display: none; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.ai {
      align-self: flex-start;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .ai .avatar {
      background: var(--surface);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .user .avatar {
      background: var(--surface2);
      font-size: 0.8rem;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .user .bubble {
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .ai .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border);
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--text2);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    /* ── QUICK REPLIES ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px 4px;
      flex-shrink: 0;
      max-width: 680px;
      align-self: center;
      width: 100%;
    }

    .quick-reply {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #555;
      padding: 8px 14px;
      font-size: 0.82rem;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
      font-family: inherit;
    }

    .quick-reply:hover {
      border-color: #6366f1;
      color: #6366f1;
    }

    /* ── INPUT ── */
    .input-area {
      padding: 12px 24px 28px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
      max-width: 680px;
      width: 100%;
      align-self: center;
      transition: background 0.3s;
    }

    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 24px;
      display: flex;
      align-items: center;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: #aaa;
    }

    #userInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      padding: 8px 0;
      resize: none;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.4;
    }

    #userInput::placeholder { color: var(--text2); }

    .send-btn {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover { transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; }

    .mic-btn {
      width: 44px;
      height: 44px;
      background: var(--surface2);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 50%;
      color: var(--text2);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .mic-btn:hover, .mic-btn.active {
      background: rgba(239,68,68,0.2);
      color: #ef4444;
      border-color: rgba(239,68,68,0.3);
    }

    /* ── PRO BANNER ── */
    .pro-banner {
      margin: 0 16px 12px;
      background: #ebebeb;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pro-banner span {
      font-size: 0.82rem;
      color: var(--accent2);
    }

    .pro-btn {
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">
    <div class="star-logo lg">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(0 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(22.5 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(45 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(67.5 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(90 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(112.5 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(135 50 50)"/>
        <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(157.5 50 50)"/>
      </svg>
    </div>
  </div>
  <div class="splash-title">Nason</div>
  <div class="splash-slogan">The Oracle</div>
  <button class="splash-btn" onclick="startApp()">Get Started</button>
</div>

<!-- Settings overlay -->
<div id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <div class="settings-title">Settings</div>
      <button class="settings-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="settings-row">
      <div class="settings-label">Your Name</div>
      <input class="settings-input" id="settingsName" type="text" placeholder="Enter your name">
    </div>
    <div class="settings-row">
      <div class="settings-label">Location</div>
      <input class="settings-input" id="settingsLocation" type="text" placeholder="Los Angeles">
    </div>
    <div class="settings-row">
      <div class="settings-label">Voice</div>
      <select class="settings-input" id="settingsVoice" style="cursor:pointer;"></select>
    </div>
    <div class="settings-row">
      <div class="toggle-row">
        <div class="toggle-label">Dark Mode</div>
        <button class="toggle" id="darkToggle" onclick="toggleDark()"></button>
      </div>
    </div>
    <button class="settings-save" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-avatar">
      <div class="star-logo lg">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(0 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(22.5 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(45 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(67.5 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(90 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(112.5 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(135 50 50)"/>
          <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(157.5 50 50)"/>
        </svg>
      </div>
    </div>
    <div class="header-info">
      <h1>Nason</h1>
      <div class="header-status"><span class="status-dot"></span> Online</div>
    </div>
  </div>
  <button class="gear-btn" onclick="openSettings()" title="Settings">⚙</button>
</div>

<!-- Input at top -->
<div class="input-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="input-wrap">
    <textarea id="userInput" placeholder="What can I help you with?" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Messages + Quick Replies together -->
<div class="messages" id="messages"></div>
<div class="quick-replies" id="quickReplies">
  <button class="quick-reply" onclick="sendQuick(this)">What can you do?</button>
  <button class="quick-reply" onclick="sendQuick(this)">What's the weather?</button>
  <button class="quick-reply" onclick="sendQuick(this)">What time is it?</button>
  <button class="quick-reply" onclick="sendQuick(this)">Write something for me</button>
  <button class="quick-reply" onclick="sendQuick(this)">Give me an idea</button>
</div>

<script>
  // ── CONFIG ──
  const API_KEY = '';

  // ── SETTINGS ──
  function loadSettings() {
    const dark = localStorage.getItem('nason_dark') === 'true';
    if (dark) {
      document.body.classList.add('dark');
      document.getElementById('darkToggle').classList.add('on');
    }
  }
  loadSettings();

  function populateVoices() {
    const select = document.getElementById('settingsVoice');
    if (!select) return;
    const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    const saved = localStorage.getItem('nason_voice');
    select.innerHTML = '';
    voices.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = v.name + (v.localService ? '' : ' 🌐');
      if (v.name === saved) opt.selected = true;
      select.appendChild(opt);
    });
    if (!saved && voices.length) select.value = voices[0].name;
  }

  window.speechSynthesis.onvoiceschanged = populateVoices;
  setTimeout(populateVoices, 500);

  function openSettings() {
    const overlay = document.getElementById('settingsOverlay');
    document.getElementById('settingsName').value = localStorage.getItem('nason_name') || '';
    document.getElementById('settingsLocation').value = localStorage.getItem('nason_location') || 'Los Angeles';
    const dark = localStorage.getItem('nason_dark') === 'true';
    const toggle = document.getElementById('darkToggle');
    toggle.classList.toggle('on', dark);
    populateVoices();
    overlay.classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settingsOverlay').classList.remove('open');
  }

  function closeSettingsIfOutside(e) {
    if (e.target === document.getElementById('settingsOverlay')) closeSettings();
  }

  function toggleDark() {
    const toggle = document.getElementById('darkToggle');
    toggle.classList.toggle('on');
  }

  function saveSettings() {
    const name = document.getElementById('settingsName').value.trim();
    const location = document.getElementById('settingsLocation').value.trim() || 'Los Angeles';
    const dark = document.getElementById('darkToggle').classList.contains('on');
    const voiceSelect = document.getElementById('settingsVoice');
    if (voiceSelect && voiceSelect.value) localStorage.setItem('nason_voice', voiceSelect.value);

    if (name) {
      localStorage.setItem('nason_name', name);
      userName = name;
    }
    localStorage.setItem('nason_location', location);
    localStorage.setItem('nason_dark', dark);

    if (dark) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.remove('dark');
    }

    closeSettings();
  }

  // ── REAL DATA ──
  let weatherCache = null;
  let weatherFetchedAt = 0;

  function getUserLocation() {
    return localStorage.getItem('nason_location') || 'Los Angeles';
  }

  async function getWeather() {
    const now = Date.now();
    if (weatherCache && now - weatherFetchedAt < 15 * 60 * 1000) return weatherCache;
    try {
      const loc = getUserLocation();
      // Use coords for LA by default; future enhancement: geocode loc
      const lat = 34.0522, lon = -118.2437;
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FLos_Angeles`);
      const data = await res.json();
      const c = data.current;
      const code = c.weather_code;
      const condition = weatherCodeToText(code);
      weatherCache = {
        temp: Math.round(c.temperature_2m),
        feels: Math.round(c.apparent_temperature),
        condition,
        humidity: c.relative_humidity_2m,
        wind: Math.round(c.wind_speed_10m),
        summary: `${Math.round(c.temperature_2m)}°F, ${condition}, feels like ${Math.round(c.apparent_temperature)}°F, humidity ${c.relative_humidity_2m}%, wind ${Math.round(c.wind_speed_10m)} mph`
      };
      weatherFetchedAt = now;
      return weatherCache;
    } catch(e) {
      return null;
    }
  }

  function weatherCodeToText(code) {
    if (code === 0) return 'clear sky';
    if (code <= 2) return 'partly cloudy';
    if (code === 3) return 'overcast';
    if (code <= 49) return 'foggy';
    if (code <= 59) return 'drizzling';
    if (code <= 69) return 'raining';
    if (code <= 79) return 'snowing';
    if (code <= 82) return 'rain showers';
    if (code <= 86) return 'snow showers';
    if (code <= 99) return 'thunderstorm';
    return 'unknown';
  }

  function getCurrentDateTime() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return {
      day: days[now.getDay()],
      date: `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`,
      time: now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }),
      summary: `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} at ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })} Pacific Time`
    };
  }

  let userName = localStorage.getItem('nason_name') || 'Kurt';
  let messageCount = parseInt(localStorage.getItem('nason_msg_count') || '0');

  if (!localStorage.getItem('nason_memory')) {
    const defaultMemory = [
      { date: 'setup', note: 'Full name is Kurt Meisenbach' },
      { date: 'setup', note: 'Husband is Steve Simonian' },
      { date: 'setup', note: 'Has twins — Ethan (boy) and Eva (girl) — born July 6, 2014' },
      { date: 'setup', note: 'Home address: 837 S. Bronson Avenue, Los Angeles, CA 90005' },
    ];
    localStorage.setItem('nason_memory', JSON.stringify(defaultMemory));
    localStorage.setItem('nason_name', 'Kurt');
  }
  const memory = JSON.parse(localStorage.getItem('nason_memory') || '[]');

  const messages = [];

  function getGreeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    if (h < 21) return 'Good evening';
    return 'Hey';
  }

  function startApp() {
    document.getElementById('splash').classList.add('hidden');
    setTimeout(() => {
      if (!userName) {
        addMessage('ai', "Hi, I'm Nason. What's your name?");
        window._awaitingName = true;
      } else {
        const greeting = getGreeting();
        addMessage('ai', `${greeting}, ${userName}. What can I help you with?`);
      }
    }, 300);
  }

  function makeStarSVG(size) {
    return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(0 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(22.5 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(45 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(67.5 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(90 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(112.5 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(135 50 50)"/>
      <line x1="50" y1="10" x2="50" y2="90" stroke="#9fa3cc" stroke-width="1.2" stroke-linecap="round" transform="rotate(157.5 50 50)"/>
    </svg>`;
  }

  function addMessage(role, text, isTyping = false) {
    const container = document.getElementById('messages');

    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.id = isTyping ? 'typing-indicator' : '';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    if (role === 'ai') {
      const starWrap = document.createElement('div');
      starWrap.className = 'star-logo sm';
      starWrap.innerHTML = makeStarSVG(28);
      avatar.appendChild(starWrap);
    } else {
      avatar.textContent = '👤';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (isTyping) {
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      bubble.textContent = text;
      messages.push({ role: role === 'ai' ? 'assistant' : 'user', content: text });
      if (role === 'ai') speak(text);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return msg;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 1.0;
    utter.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const savedVoice = localStorage.getItem('nason_voice');
    const preferred = savedVoice
      ? voices.find(v => v.name === savedVoice)
      : voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel') || v.name.includes('Google') || v.lang === 'en-US');
    if (preferred) utter.voice = preferred;
    window.speechSynthesis.speak(utter);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    addMessage('user', text);
    messageCount++;
    localStorage.setItem('nason_msg_count', messageCount);

    if (window._awaitingName) {
      window._awaitingName = false;
      userName = text.trim().split(' ')[0];
      localStorage.setItem('nason_name', userName);
      const greeting = getGreeting();
      addMessage('ai', `Nice to meet you, ${userName}. I'll remember that. ${greeting} — what can I help you with?`);
      return;
    }

    if (text.toLowerCase().startsWith('remember ') || text.toLowerCase().includes('remember that')) {
      const thing = text.replace(/remember that/i, '').replace(/remember/i, '').trim();
      memory.push({ date: new Date().toLocaleDateString(), note: thing });
      localStorage.setItem('nason_memory', JSON.stringify(memory));
      addMessage('ai', `Got it, I'll remember that${userName ? ', ' + userName : ''}.`);
      return;
    }

    addMessage('ai', '', true);
    const reply = await getAIResponse(text);
    removeTyping();
    addMessage('ai', reply);
  }

  async function getAIResponse(userText) {
    const [weather, dateTime] = await Promise.all([getWeather(), Promise.resolve(getCurrentDateTime())]);
    const loc = getUserLocation();
    const weatherContext = weather ? `Current weather in ${loc}: ${weather.summary}.` : 'Weather data unavailable.';
    const timeContext = `Current date and time: ${dateTime.summary}.`;

    const isWeatherQ = /weather|temperature|temp|hot|cold|raining|rain|sunny|forecast|outside/i.test(userText);
    const isTimeQ = /time|date|day|today|tonight|what day|what time/i.test(userText);

    if (!API_KEY) {
      await new Promise(r => setTimeout(r, 600 + Math.random() * 400));
      if (isWeatherQ && weather) {
        return `Right now in ${loc} it's ${weather.temp}°F and ${weather.condition}. Feels like ${weather.feels}°F with ${weather.humidity}% humidity and ${weather.wind} mph winds.`;
      }
      if (isTimeQ) {
        return `It's ${dateTime.time} on ${dateTime.day}, ${dateTime.date}.`;
      }
      const demos = [
        "I'm Nason, your personal AI assistant! To enable full AI responses, add your Anthropic API key. But I can already tell you the weather and time! ⚡",
        "Great question! I can help you with tasks, writing, research, reminders, and so much more. The 'The Oracle' philosophy means I work for you — on your terms.",
        "I love that idea! Tell me more and we can work through it together.",
        "That's something I can definitely help with. Let me think through this with you...",
        "You're in the right place. I'm designed to make your life easier and help you accomplish more. What's the first thing you'd like to tackle?",
      ];
      return demos[Math.floor(Math.random() * demos.length)];
    }

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': API_KEY,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json'
        },
        body: JSON.stringify({
          model: 'claude-3-5-haiku-20241022',
          max_tokens: 1024,
          system: `You are Nason, a warm, capable, and direct personal AI assistant. Your slogan is "The Oracle." The user's name is ${userName || 'unknown'}. Occasionally use their name naturally. You help users accomplish tasks, think through problems, write content, and more. Keep responses concise and conversational. Be genuinely helpful without being sycophantic. You are not "Nason AI" — just Nason.

REAL-TIME CONTEXT (use this to answer questions accurately):
- ${timeContext}
- ${weatherContext}
- User location: ${loc}

Things you remember about this user: ${memory.length > 0 ? memory.map(m => m.note).join('; ') : 'nothing yet'}.`,
          messages: messages.slice(-10)
        })
      });
      const data = await res.json();
      return data.content[0].text;
    } catch (e) {
      return "I hit a small snag — try again in a moment. ⚡";
    }
  }

  function sendQuick(btn) {
    document.getElementById('userInput').value = btn.textContent.replace(/^[^\w]+/, '').trim();
    sendMessage();
  }

  function toggleMic() {
    const btn = document.getElementById('micBtn');
    btn.classList.toggle('active');
    if (btn.classList.contains('active')) {
      btn.textContent = '⏹';
      if ('webkitSpeechRecognition' in window) {
        const rec = new webkitSpeechRecognition();
        rec.continuous = false;
        rec.interimResults = false;
        rec.onresult = (e) => {
          document.getElementById('userInput').value = e.results[0][0].transcript;
          btn.classList.remove('active');
          btn.textContent = '🎤';
        };
        rec.onerror = () => { btn.classList.remove('active'); btn.textContent = '🎤'; };
        rec.start();
      }
    } else {
      btn.textContent = '🎤';
    }
  }

  const textarea = document.getElementById('userInput');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Nason SW registered'))
        .catch(e => console.log('SW error:', e));
    });
  }
</script>
</body>
